name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  android:
    name: Android APKs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for git describe versioning

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Create debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v \
            -keystore ~/.android/debug.keystore \
            -storepass android -keypass android \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build all Android modules
        run: ./gradlew assembleRelease --no-daemon

      - name: Platform-sign FreewheelBridge
        if: github.event_name == 'push' || github.event_name == 'release'
        env:
          PLATFORM_PK8_B64: ${{ secrets.PLATFORM_PK8_B64 }}
          PLATFORM_CERT_B64: ${{ secrets.PLATFORM_CERT_B64 }}
        run: |
          if [ -z "$PLATFORM_PK8_B64" ] || [ -z "$PLATFORM_CERT_B64" ]; then
            echo "::warning::Platform signing keys not configured — skipping FreewheelBridge signing"
            exit 0
          fi

          echo "$PLATFORM_PK8_B64" | base64 -d > /tmp/platform.pk8
          echo "$PLATFORM_CERT_B64" | base64 -d > /tmp/device_platform.x509.pem

          BUILD_TOOLS="${ANDROID_HOME}/build-tools/34.0.0"

          APK_IN="freewheelbridge/build/outputs/apk/release/freewheelbridge-release-unsigned.apk"
          APK_ALIGNED="freewheelbridge/build/outputs/apk/freewheelbridge-aligned.apk"
          APK_OUT="freewheelbridge/build/outputs/apk/freewheelbridge.apk"

          "${BUILD_TOOLS}/zipalign" -f 4 "$APK_IN" "$APK_ALIGNED"
          "${BUILD_TOOLS}/apksigner" sign \
            --key /tmp/platform.pk8 \
            --cert /tmp/device_platform.x509.pem \
            --out "$APK_OUT" \
            "$APK_ALIGNED"
          rm -f "$APK_ALIGNED"

          "${BUILD_TOOLS}/apksigner" verify --print-certs "$APK_OUT"
          echo "Signed: $APK_OUT ($(stat -c%s "$APK_OUT") bytes)"

          rm -f /tmp/platform.pk8 /tmp/device_platform.x509.pem

      - name: Build standalone JARs
        run: ./gradlew :ucblib:buildClassesJar :velofit:buildClassesJar --no-daemon

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          cp launcher/build/outputs/apk/release/launcher-release.apk artifacts/velolauncher.apk

          if [ -f freewheelbridge/build/outputs/apk/freewheelbridge.apk ]; then
            cp freewheelbridge/build/outputs/apk/freewheelbridge.apk artifacts/serialbridge.apk
          else
            cp freewheelbridge/build/outputs/apk/release/freewheelbridge-release-unsigned.apk artifacts/serialbridge-unsigned.apk
          fi

          cp ucblib/build/libs/ucblib.jar artifacts/
          cp velofit/build/libs/velofit.jar artifacts/

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: artifacts/
          retention-days: 30

  jailbreak:
    name: FreeWheel Jailbreak (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for git describe

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: freewheel-jailbreak/go.mod
          cache-dependency-path: freewheel-jailbreak/go.sum

      - name: Generate Windows resources
        shell: bash
        run: |
          go install github.com/tc-hib/go-winres@latest
          cd freewheel-jailbreak/cmd/freewheel
          go-winres make

      - name: Build FreeWheel
        shell: bash
        run: |
          cd freewheel-jailbreak
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          VERSION=${VERSION#v}
          HASH=$(git rev-parse --short=8 HEAD)
          go build -ldflags "-H windowsgui -X main.version=${VERSION} -X main.gitHash=${HASH}" -o freewheel.exe ./cmd/freewheel
          ls -lh freewheel.exe

      - name: Upload FreeWheel
        uses: actions/upload-artifact@v4
        with:
          name: freewheel-windows
          path: freewheel-jailbreak/freewheel.exe
          retention-days: 30
